services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ports:
    # - "${BACKEND_PORT}:8080" 
    restart: unless-stopped  
    environment:
      - DATABASE_DSN=gorm:gorm@tcp(172.19.0.1:3306)/gorm?charset=utf8&parseTime=True&loc=Local
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
    dns:
      - 1.1.1.1
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ping | grep -q pong || exit 1"]
    #   interval: 60s
    #   timeout: 3s
    #   retries: 20
    #   start_period: 60s
    networks:
      - internal-net

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
    - "8080:80"
    # depends_on:
    #   backend:
    #     condition: service_healthy
    networks:
      - internal-net
      - tinker-net

networks:
  tinker-net:
    external: true
  internal-net:
    driver: bridge
    internal: true
